# CI for Product Catalog Service

name: product-catalog-ci

on: 
    pull_request:
        branches:
        - main

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
        - name: checkout code
          uses: actions/checkout@v4
        
        - name: Setup Go 1.22
          uses: actions/setup-go@v2
          with:
            go-version: 1.22
        
        - name: Build
          run: |    
            cd src/product-catalog
            go mod download
            go build -o product-catalog-service main.go
        - name: unit tests
          run: |
            cd src/product-catalog
            go test ./...
    
    code-quality:
        runs-on: ubuntu-latest
        
        steps:
        - name: checkout code
          uses: actions/checkout@v4
        
        - name: Setup Go 1.22
          uses: actions/setup-go@v2
          with:
           go-version: 1.22
        - name: Run golangci-lint
          uses: golangci/golangci-lint-action@v6
          with:
            version: v1.55.2
            run: golangci-lint run
            working-directory: src/product-catalog
    
    docker:

        runs-on: ubuntu-latest  
        needs: build

        steps:
        - name: checkout code
          uses: actions/checkout@v4
        
        - name: Install Docker
          uses:  docker/setup-build-action@v1

        - name: Loggin to Dcoker
          uses: docker/login-action@v2
          with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_TOKEN }}  
        - name: Docker Push
          uses: docker/build-push-action@v2
          with:
            context: src/product-catalog
            file: src/product-catalog/Dockerfile
            push: true      
            tags: ${{ secrets.DOCKER_USERNAME }}/product-catalog:${{ github.run_id }} 
    updatek8s:

        runs-on: ubuntu-latest
        needs: [build,code-quality,docker]

        steps:
        - name: checkout code
          uses: actions/checkout@v4

          with :
            token: ${{ secrets.GITHUB_TOKEN }}
        - name: Update tag in k8 deployment file
          run: |
            sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/product-catalog:${{ github.run_id }}|g" src/k8s/product-catalog-deployment.yaml
        
        - name: Commit and Push changes
          run: |
            git config --global user.name "Shalha-Mucha18"
            git config --global user.email "ms.mucha18@gmail.com"
            git add src/k8s/product-catalog-deployment.yaml
            git commit -m "Update product-catalog image tag"
            git push origin main